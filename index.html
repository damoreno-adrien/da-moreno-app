<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Da Moreno | Supply Order System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal-open { overflow: hidden; }
        #toast-container { position: fixed; top: 1.25rem; right: 1.25rem; z-index: 50; }
        .toast { transform: translateX(120%); transition: transform 0.3s ease-in-out; }
        .toast.show { transform: translateX(0); }
        .lang-btn.active { background-color: #2563eb; color: white; }
        .lang-btn:not(.active) { background-color: #e5e7eb; color: #374151; }
        .nav-link.active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="toast-container"></div>
    <div id="access-denied" class="hidden text-center p-8"><h1 class="text-2xl font-bold text-red-600">Access Denied</h1><p class="text-gray-700">Redirecting...</p></div>

    <div id="app" class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 pb-24 hidden">

        <!-- HEADER HARMONISÉ -->
        <header class="mb-8 bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-100">
            <div class="flex flex-col xl:flex-row justify-between xl:items-center gap-4">
                <div class="flex items-center gap-3">
                    <h1 class="text-2xl sm:text-3xl font-bold text-gray-800" data-key="main_title">Da Moreno</h1>
                    <span id="role-badge" class="hidden text-[10px] px-2 py-1 rounded-full font-bold uppercase tracking-wide"></span>
                </div>
                <div class="flex flex-wrap items-center gap-3 w-full xl:w-auto justify-between xl:justify-end">
                    <p id="user-display" class="text-sm font-medium text-gray-600 hidden 2xl:block truncate max-w-xs"></p>
                    <div id="branch-context-container" class="hidden items-center bg-gray-50 border rounded-lg px-2 py-1 shrink-0 order-1">
                        <span class="text-xs text-gray-500 mr-2 font-bold uppercase">Branch:</span>
                        <select id="branch-context-select" class="bg-transparent text-sm font-bold text-blue-700 focus:outline-none"><option value="ALL">ALL BRANCHES</option></select>
                    </div>
                    <div class="flex items-center gap-2 order-2 shrink-0 ml-auto xl:ml-0">
                        <div id="lang-switcher" class="flex items-center text-sm font-medium border border-gray-300 rounded-lg p-1 bg-white">
                            <button data-lang="en" class="lang-btn px-2 py-1 rounded-md transition-colors">EN</button>
                            <button data-lang="th" class="lang-btn px-2 py-1 rounded-md transition-colors">TH</button>
                        </div>
                        <button id="logout-btn" class="px-3 py-1.5 bg-red-50 text-red-600 border border-red-200 hover:bg-red-600 hover:text-white rounded-lg text-sm font-semibold transition-colors" data-key="logout">Logout</button>
                    </div>
                </div>
            </div>
            <nav class="mt-6 flex gap-1 sm:gap-4 text-sm sm:text-base font-medium text-gray-500 overflow-x-auto pb-2 scrollbar-hide w-full border-b">
                <a href="index.html" class="nav-link active py-2 px-3 bg-blue-50/50 rounded-t-lg whitespace-nowrap" data-key="create_order">Create Order</a>
                <a href="my-orders.html" class="nav-link py-2 px-3 hover:text-blue-600 hover:bg-blue-50 rounded-t-lg transition-colors whitespace-nowrap" data-key="my_orders">My Orders</a>
                <a href="receiving.html" class="receiving-link hidden nav-link py-2 px-3 hover:text-green-600 hover:bg-green-50 rounded-t-lg transition-colors whitespace-nowrap" data-key="receiving">Receiving</a>
                <a href="accounting.html" class="accounting-link hidden nav-link py-2 px-3 hover:text-purple-600 hover:bg-purple-50 rounded-t-lg transition-colors whitespace-nowrap" data-key="accounting">Accounting</a>
                <a href="admin/orders.html" class="admin-link hidden nav-link py-2 px-3 text-gray-800 hover:bg-gray-200 rounded-t-lg transition-colors items-center gap-1 font-bold whitespace-nowrap">
                    <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span data-key="admin_dashboard">Admin</span>
                </a>
            </nav>
        </header>

        <div id="team-orders-dashboard" class="mb-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-4" data-key="team_pending_orders">Team's Pending Orders</h2>
            <div id="team-pending-orders-list" class="space-y-4"></div>
            <div id="team-orders-loading" class="text-center py-6">
                <p class="text-gray-500 animate-pulse" data-key="loading_team_orders">Loading team orders...</p>
            </div>
        </div>

        <div class="mb-8 p-4 bg-white rounded-lg shadow-sm border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-4" data-key="product_catalog">Product Catalog</h2>
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="relative flex-grow">
                    <input type="text" id="searchInput" class="w-full pl-10 pr-10 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" data-key-placeholder="search_placeholder">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <button id="clearSearch" class="absolute right-3 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400 hover:text-gray-600 hidden">&times;</button>
                </div>
                <div id="category-filters" class="flex items-center gap-2 overflow-x-auto pb-2"></div>
            </div>
        </div>

        <main id="product-grid" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></main>

        <div id="loading" class="text-center py-10"><p class="text-gray-500 animate-pulse" data-key="loading_products">Loading products...</p></div>

        <button id="cart-button" class="fixed bottom-6 right-6 bg-blue-600 text-white p-4 rounded-full shadow-lg hover:bg-blue-700 transition-transform transform hover:scale-110 z-20">
            <svg class="h-8 w-8" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-6 w-6 flex items-center justify-center">0</span>
        </button>

        <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-30 p-4">
            <div class="bg-white rounded-lg shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
                <div class="flex justify-between items-center p-4 border-b">
                    <h2 id="cart-modal-title" class="text-2xl font-bold text-gray-800" data-key="current_order">Current Order</h2>
                    <button id="close-modal-btn" class="text-gray-500 hover:text-gray-800 text-3xl leading-none">&times;</button>
                </div>
                <div id="cart-items-container" class="p-6 overflow-y-auto"></div>
                <div class="p-6 border-t mt-auto">
                    <textarea id="order-notes" class="w-full p-2 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" data-key-placeholder="notes_placeholder"></textarea>
                    <div class="flex justify-end gap-4">
                        <button id="close-modal-btn-footer" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300" data-key="close">Close</button>
                        <button id="place-order-btn" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 flex items-center justify-center gap-2">
                            <span id="place-order-text" data-key="place_order">Place Order</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/client-catalog.js"></script>
</body>
</html>
