<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Da Moreno Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://fav.farm/🇮🇹" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal-open { overflow: hidden; }
        .table-cell { padding: 8px; white-space: nowrap; }
        @media (min-width: 640px) {
            .table-cell { padding: 12px 16px; }
        }
        #toast-container { position: fixed; top: 1.25rem; right: 1.25rem; z-index: 50; }
        .toast { transform: translateX(120%); transition: transform 0.3s ease-in-out; }
        .toast.show { transform: translateX(0); }
        .lang-btn.active { background-color: #2563eb; color: white; }
        .lang-btn:not(.active) { background-color: #e5e7eb; color: #374151; }
        .tab-btn.active { border-color: #2563eb; color: #2563eb; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div id="app-loading" class="fixed inset-0 bg-white flex items-center justify-center z-50">
        <svg class="animate-spin h-8 w-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
    </div>

    <div id="app-content" class="hidden">
        <nav class="bg-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <span class="font-bold text-xl text-blue-600">Da Moreno Admin</span>
                    </div>
                    <div class="flex items-center">
                        <span id="user-name" class="mr-4 font-medium hidden sm:block"></span>
                        <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg transition duration-300">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
            <div class="px-4 py-6 sm:px-0">
                <div class="border-b border-gray-200 mb-4">
                    <nav class="-mb-px flex space-x-8" aria-label="Tabs">
                        <button class="tab-btn whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm" data-tab="products">Products</button>
                        <button class="tab-btn whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm" data-tab="suppliers">Suppliers</button>
                        <button class="tab-btn whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm" data-tab="departments">Departments</button>
                        <button class="tab-btn whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm" data-tab="staff">Staff</button>
                    </nav>
                </div>

                <div id="products-tab" class="tab-content">
                    <div class="sm:flex sm:items-center sm:justify-between mb-4">
                        <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:text-3xl sm:truncate">Products</h2>
                        <div class="mt-4 sm:mt-0 sm:ml-4 flex gap-2">
                             <button id="import-products-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg">Import CSV</button>
                             <button id="export-products-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg">Export CSV</button>
                             <button id="add-product-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">Add Product</button>
                             <input type="file" id="product-csv-input" class="hidden" accept=".csv">
                        </div>
                    </div>
                    <input id="product-search" type="text" placeholder="Search products..." class="w-full p-2 border border-gray-300 rounded-lg mb-4">
                    <div class="overflow-x-auto bg-white rounded-lg shadow">
                         <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50"><tr>
                                <th class="table-cell text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name (EN)</th>
                                <th class="table-cell text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name (TH)</th>
                                <th class="table-cell text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                                <th class="table-cell text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Supplier</th>
                                <th class="table-cell text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                <th class="table-cell text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr></thead>
                            <tbody id="products-table-body" class="bg-white divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>

                <div id="suppliers-tab" class="tab-content hidden">
                    <div class="sm:flex sm:items-center sm:justify-between mb-4">
                         <h2 class="text-2xl font-bold">Suppliers</h2>
                         <div class="mt-4 sm:mt-0 sm:ml-4 flex gap-2">
                             <button id="import-supplier-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg">Import CSV</button>
                             <button id="export-supplier-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg">Export CSV</button>
                             <button id="add-supplier-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">Add Supplier</button>
                             <input type="file" id="supplier-csv-input" class="hidden" accept=".csv">
                        </div>
                    </div>
                    <div id="suppliers-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>

                <div id="departments-tab" class="tab-content hidden">
                    <div class="sm:flex sm:items-center sm:justify-between mb-4">
                        <h2 class="text-2xl font-bold">Departments</h2>
                        <div class="mt-4 sm:mt-0 sm:ml-4 flex gap-2">
                            <button id="import-department-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg">Import CSV</button>
                            <button id="export-department-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg">Export CSV</button>
                            <button id="add-department-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">Add Department</button>
                            <input type="file" id="department-csv-input" class="hidden" accept=".csv">
                        </div>
                    </div>
                    <div id="departments-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>

                 <div id="staff-tab" class="tab-content hidden">
                    <div class="sm:flex sm:items-center sm:justify-between mb-4">
                        <h2 class="text-2xl font-bold">Staff</h2>
                        <div class="mt-4 sm:mt-0 sm:ml-4 flex gap-2">
                             <button id="import-staff-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg">Import CSV</button>
                             <button id="export-staff-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg">Export CSV</button>
                        </div>
                        <input type="file" id="staff-csv-input" class="hidden" accept=".csv">
                    </div>
                     <div id="staff-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="productModal" class="fixed z-10 inset-0 overflow-y-auto hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <form id="product-form" class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">Add Product</h3>
                    <input type="hidden" id="product-id">
                    <div class="mt-2 grid grid-cols-1 gap-y-6 sm:grid-cols-2 sm:gap-x-4">
                        <div>
                            <label for="product-name-en" class="block text-sm font-medium text-gray-700">Name (EN)</label>
                            <input type="text" id="product-name-en" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" required>
                        </div>
                        <div>
                            <label for="product-name-th" class="block text-sm font-medium text-gray-700">Name (TH)</label>
                            <input type="text" id="product-name-th" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                        <div>
                            <label for="product-category-en" class="block text-sm font-medium text-gray-700">Category (EN)</label>
                            <input type="text" id="product-category-en" list="category-list-en" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                            <datalist id="category-list-en"></datalist>
                        </div>
                        <div>
                            <label for="product-category-th" class="block text-sm font-medium text-gray-700">Category (TH)</label>
                            <input type="text" id="product-category-th" list="category-list-th" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                            <datalist id="category-list-th"></datalist>
                        </div>
                        <div>
                            <label for="product-packaging-en" class="block text-sm font-medium text-gray-700">Packaging (EN)</label>
                            <input type="text" id="product-packaging-en" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                        <div>
                            <label for="product-packaging-th" class="block text-sm font-medium text-gray-700">Packaging (TH)</label>
                            <input type="text" id="product-packaging-th" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                         <div class="sm:col-span-2">
                            <label for="product-supplier" class="block text-sm font-medium text-gray-700">Supplier</label>
                            <select id="product-supplier" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md"></select>
                        </div>
                        <div class="sm:col-span-2">
                            <label for="product-reference" class="block text-sm font-medium text-gray-700">Product Reference</label>
                            <input type="text" id="product-reference" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                        <div class="sm:col-span-2">
                            <label for="product-keywords" class="block text-sm font-medium text-gray-700">Keywords (comma separated)</label>
                            <input type="text" id="product-keywords" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                         <div class="sm:col-span-2">
                            <label for="product-image-url" class="block text-sm font-medium text-gray-700">Image URL</label>
                            <input type="url" id="product-image-url" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                        <div class="sm:col-span-2 flex items-center">
                            <input id="product-is-active" type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                            <label for="product-is-active" class="ml-2 block text-sm text-gray-900">Active</label>
                        </div>
                    </div>
                </form>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button type="submit" form="product-form" id="save-product-btn" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">Save</button>
                    <button type="button" id="cancel-product-btn" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="simple-modal" class="fixed z-10 inset-0 overflow-y-auto hidden">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
             <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <form id="simple-form">
                     <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <h3 class="text-lg leading-6 font-medium text-gray-900" id="simple-modal-title">Modal</h3>
                        <input type="hidden" id="simple-modal-id">
                        <div id="simple-modal-fields" class="mt-4 space-y-4"></div>
                     </div>
                     <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                         <button type="submit" id="simple-modal-save" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">Save</button>
                         <button type="button" id="simple-modal-cancel" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">Cancel</button>
                         <button type="button" id="simple-modal-delete" class="hidden mr-auto w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none sm:w-auto sm:text-sm">Delete</button>
                     </div>
                </form>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, query, orderBy, where, getDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- Firebase Config ---
        // === MODIFICATION START: Using the correct environment variable for Firebase config ===
        let app, auth, db;
        try {
            // Check if the __firebase_config variable is provided by the environment
            if (typeof __firebase_config === 'undefined' || !__firebase_config) {
                throw new Error("Firebase config is not available in the environment.");
            }
            const firebaseConfig = JSON.parse(__firebase_config);
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) {
            console.error("FATAL: Could not initialize Firebase.", error);
            const appLoading = document.getElementById('app-loading');
            appLoading.innerHTML = `<div class="text-center p-4">
                <h1 class="text-2xl font-bold text-red-600 mb-2">Application Error</h1>
                <p class="text-gray-700">Could not initialize Firebase. Please check the console for details.</p>
                <p class="text-gray-500 text-sm mt-2">The Firebase configuration might be missing or invalid.</p>
            </div>`;
            // Stop further script execution by re-throwing the error
            throw error;
        }
        // === MODIFICATION END ===


        // --- Global State ---
        let allProducts = [];
        let allSuppliers = [];
        let allDepartments = [];
        let allStaff = [];
        let allCategories = [];
        let currentUser = null;

        // --- UI Elements ---
        const appLoading = document.getElementById('app-loading');
        const appContent = document.getElementById('app-content');
        const logoutBtn = document.getElementById('logoutBtn');
        const userName = document.getElementById('user-name');
        
        // --- Tabs ---
        const tabButtons = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        // --- Products ---
        const productsTableBody = document.getElementById('products-table-body');
        const productSearch = document.getElementById('product-search');
        const addProductBtn = document.getElementById('add-product-btn');
        const productModal = document.getElementById('productModal');
        const productForm = document.getElementById('product-form');
        const saveProductBtn = document.getElementById('save-product-btn');
        const cancelProductBtn = document.getElementById('cancel-product-btn');
        const productSupplierSelect = document.getElementById('product-supplier');
        const categoryEnInput = document.getElementById('product-category-en');
        const categoryThInput = document.getElementById('product-category-th');
        const categoryEnDatalist = document.getElementById('category-list-en');
        const categoryThDatalist = document.getElementById('category-list-th');
        
        // --- CSV Import/Export ---
        const importProductsBtn = document.getElementById('import-products-btn');
        const exportProductsBtn = document.getElementById('export-products-btn');
        const productCsvInput = document.getElementById('product-csv-input');
        
        const importSupplierBtn = document.getElementById('import-supplier-btn');
        const exportSupplierBtn = document.getElementById('export-supplier-btn');
        const supplierCsvInput = document.getElementById('supplier-csv-input');

        const importDepartmentBtn = document.getElementById('import-department-btn');
        const exportDepartmentBtn = document.getElementById('export-department-btn');
        const departmentCsvInput = document.getElementById('department-csv-input');
        
        const importStaffBtn = document.getElementById('import-staff-btn');
        const exportStaffBtn = document.getElementById('export-staff-btn');
        const staffCsvInput = document.getElementById('staff-csv-input');
        
        // --- Simple Modal ---
        const simpleModal = document.getElementById('simple-modal');
        const simpleModalTitle = document.getElementById('simple-modal-title');
        const simpleModalFields = document.getElementById('simple-modal-fields');
        const simpleForm = document.getElementById('simple-form');
        const simpleModalSave = document.getElementById('simple-modal-save');
        const simpleModalCancel = document.getElementById('simple-modal-cancel');
        const simpleModalDelete = document.getElementById('simple-modal-delete');
        let simpleModalConfig = {};

        // --- Authentication ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    userName.textContent = `Welcome, ${userData.name}`;
                    if(userData.department_name_en?.toLowerCase() === 'admin') {
                        loadInitialData();
                    } else {
                        window.location.href = '/';
                    }
                } else {
                     window.location.href = '/login.html';
                }
            } else {
                window.location.href = '/login.html';
            }
        });
        
        async function loadInitialData() {
            await Promise.all([
                fetchSuppliers(),
                fetchDepartments(),
                fetchStaff(),
                fetchProducts()
            ]);
            appLoading.classList.add('hidden');
            appContent.classList.remove('hidden');
            
            switchTab('products');
        }

        // --- Data Fetching ---
        async function fetchProducts() {
            const productsCol = collection(db, "products");
            const q = query(productsCol, orderBy("name_en"));
            const productSnapshot = await getDocs(q);
            allProducts = productSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts();
            await fetchCategories();
        }

        async function fetchCategories() {
            const categories = new Map();
            allProducts.forEach(product => {
                if (product.category_en && !categories.has(product.category_en.toLowerCase())) {
                    categories.set(product.category_en.toLowerCase(), {
                        name_en: product.category_en,
                        name_th: product.category_th || ''
                    });
                }
            });
            allCategories = Array.from(categories.values()).sort((a,b) => a.name_en.localeCompare(b.name_en));
            populateCategoryDatalists();
        }

        async function fetchSuppliers() {
            const suppliersCol = collection(db, "suppliers");
            const q = query(suppliersCol, orderBy("name"));
            const supplierSnapshot = await getDocs(q);
            allSuppliers = supplierSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderSuppliers();
        }
        
        async function fetchDepartments() {
            const departmentsCol = collection(db, "departments");
            const departmentSnapshot = await getDocs(collection(db, "departments"));
            allDepartments = departmentSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderDepartments();
        }
        
        async function fetchStaff() {
             const staffSnapshot = await getDocs(collection(db, "users"));
             allStaff = staffSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
             renderStaff();
        }

        // --- Rendering ---
        function renderProducts(filter = '') {
            const filteredProducts = allProducts.filter(p => 
                p.name_en.toLowerCase().includes(filter.toLowerCase()) ||
                (p.name_th && p.name_th.toLowerCase().includes(filter.toLowerCase())) ||
                (p.category_en && p.category_en.toLowerCase().includes(filter.toLowerCase()))
            );

            productsTableBody.innerHTML = filteredProducts.map(product => `
                <tr class="hover:bg-gray-50">
                    <td class="table-cell">${product.name_en}</td>
                    <td class="table-cell">${product.name_th || ''}</td>
                    <td class="table-cell">${product.category_en || ''}</td>
                    <td class="table-cell">${allSuppliers.find(s => s.id === product.supplier)?.name || 'N/A'}</td>
                    <td class="table-cell">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${product.isActive ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${product.isActive ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td class="table-cell text-right text-sm font-medium">
                        <button class="text-blue-600 hover:text-blue-900 edit-product-btn" data-id="${product.id}">Edit</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function renderGenericList(elementId, items, config) {
            const container = document.getElementById(elementId);
            container.innerHTML = items.map(item => `
                <div class="bg-white p-4 rounded-lg shadow flex justify-between items-center">
                    <div>
                        ${config.fields.map(field => `<p class="font-medium ${field.primary ? 'text-lg' : 'text-sm text-gray-500'}">${item[field.key] || ''}</p>`).join('')}
                    </div>
                    <button class="text-blue-600 hover:text-blue-900 edit-btn" data-type="${config.type}" data-id="${item.id}">Edit</button>
                </div>
            `).join('');
        }
        
        function renderSuppliers() { renderGenericList('suppliers-list', allSuppliers, { type: 'supplier', fields: [{ key: 'name', primary: true }] }); }
        function renderDepartments() { renderGenericList('departments-list', allDepartments, { type: 'department', fields: [{ key: 'name_en', primary: true }, { key: 'name_th', primary: false }] }); }
        function renderStaff() {
            const staffWithDept = allStaff.map(s => ({
                ...s,
                department_name_en: allDepartments.find(d => d.id === s.departmentId)?.name_en || 'N/A'
            }));
            renderGenericList('staff-list', staffWithDept, { type: 'staff', fields: [{key: 'name', primary: true}, {key: 'department_name_en', primary: false}] });
        }
        
        function populateCategoryDatalists() {
            categoryEnDatalist.innerHTML = allCategories.map(cat => `<option value="${cat.name_en}"></option>`).join('');
            categoryThDatalist.innerHTML = allCategories.map(cat => `<option value="${cat.name_th}"></option>`).join('');
        }

        // --- Event Listeners ---
        logoutBtn.addEventListener('click', () => signOut(auth));
        
        productSearch.addEventListener('input', (e) => renderProducts(e.target.value));

        tabButtons.forEach(button => {
            button.addEventListener('click', () => switchTab(button.dataset.tab));
        });

        // --- Product Modal Logic ---
        addProductBtn.addEventListener('click', openProductModal);
        cancelProductBtn.addEventListener('click', closeProductModal);
        productModal.addEventListener('click', (e) => { if (e.target === productModal) closeProductModal(); });

        productsTableBody.addEventListener('click', (e) => {
            if (e.target.classList.contains('edit-product-btn')) {
                const productId = e.target.dataset.id;
                const product = allProducts.find(p => p.id === productId);
                openProductModal(product);
            }
        });

        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('product-id').value;
            const productData = {
                name_en: document.getElementById('product-name-en').value,
                name_th: document.getElementById('product-name-th').value,
                category_en: document.getElementById('product-category-en').value,
                category_th: document.getElementById('product-category-th').value,
                packaging_en: document.getElementById('product-packaging-en').value,
                packaging_th: document.getElementById('product-packaging-th').value,
                supplier: document.getElementById('product-supplier').value,
                product_reference: document.getElementById('product-reference').value,
                keywords: document.getElementById('product-keywords').value,
                imageUrl: document.getElementById('product-image-url').value,
                isActive: document.getElementById('product-is-active').checked
            };

            try {
                const docRef = id ? doc(db, 'products', id) : doc(collection(db, 'products'));
                await setDoc(docRef, productData, { merge: true });
                showToast(id ? 'Product updated successfully' : 'Product added successfully', 'success');
                fetchProducts();
                closeProductModal();
            } catch (error) {
                console.error("Error saving product:", error);
                showToast('Error saving product', 'error');
            }
        });

        categoryEnInput.addEventListener('input', (e) => {
            const selectedEn = e.target.value;
            const matchedCategory = allCategories.find(cat => cat.name_en.toLowerCase() === selectedEn.toLowerCase());
            if (matchedCategory) {
                categoryThInput.value = matchedCategory.name_th;
            }
        });

        categoryThInput.addEventListener('input', (e) => {
            const selectedTh = e.target.value;
            const matchedCategory = allCategories.find(cat => cat.name_th === selectedTh);
             if (matchedCategory) {
                categoryEnInput.value = matchedCategory.name_en;
            }
        });

        // --- Simple Modal Logic ---
        document.getElementById('suppliers-list').addEventListener('click', (e) => handleGenericEdit(e, 'supplier'));
        document.getElementById('departments-list').addEventListener('click', (e) => handleGenericEdit(e, 'department'));
        document.getElementById('staff-list').addEventListener('click', (e) => handleGenericEdit(e, 'staff'));

        document.getElementById('add-supplier-btn').addEventListener('click', () => openSimpleModal('supplier'));
        document.getElementById('add-department-btn').addEventListener('click', () => openSimpleModal('department'));

        simpleModalCancel.addEventListener('click', closeSimpleModal);
        simpleModal.addEventListener('click', (e) => { if (e.target === simpleModal) closeSimpleModal(); });
        simpleForm.addEventListener('submit', handleSimpleSave);
        simpleModalDelete.addEventListener('click', handleSimpleDelete);


        function handleGenericEdit(e, type) {
            if (e.target.classList.contains('edit-btn')) {
                const id = e.target.dataset.id;
                openSimpleModal(type, id);
            }
        }

        function openSimpleModal(type, id = null) {
            const item = id ? getStoreForType(type).find(i => i.id === id) : {};
            
            const configs = {
                supplier: {
                    title: id ? 'Edit Supplier' : 'Add Supplier',
                    collection: 'suppliers',
                    fields: [ { key: 'name', label: 'Supplier Name', type: 'text', required: true } ]
                },
                department: {
                    title: id ? 'Edit Department' : 'Add Department',
                    collection: 'departments',
                    fields: [
                        { key: 'name_en', label: 'Name (EN)', type: 'text', required: true },
                        { key: 'name_th', label: 'Name (TH)', type: 'text' }
                    ]
                },
                 staff: {
                    title: 'Edit Staff',
                    collection: 'users',
                    fields: [
                        { key: 'name', label: 'Name', type: 'text', required: true },
                        { key: 'departmentId', label: 'Department', type: 'select', options: allDepartments.map(d => ({value: d.id, text: d.name_en})) }
                    ]
                }
            };
            
            simpleModalConfig = configs[type];
            simpleModalTitle.textContent = simpleModalConfig.title;
            
            simpleModalFields.innerHTML = simpleModalConfig.fields.map(field => {
                if (field.type === 'select') {
                    return `
                        <div>
                            <label class="block text-sm font-medium text-gray-700">${field.label}</label>
                            <select id="field-${field.key}" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md">
                                ${field.options.map(opt => `<option value="${opt.value}" ${item[field.key] === opt.value ? 'selected' : ''}>${opt.text}</option>`).join('')}
                            </select>
                        </div>`;
                }
                return `
                    <div>
                        <label for="field-${field.key}" class="block text-sm font-medium text-gray-700">${field.label}</label>
                        <input type="${field.type}" id="field-${field.key}" value="${item[field.key] || ''}" ${field.required ? 'required' : ''} class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>`;
            }).join('');
            
            document.getElementById('simple-modal-id').value = id || '';
            simpleModalDelete.classList.toggle('hidden', !id || !simpleModalConfig.collection);
            simpleModal.classList.remove('hidden');
        }
        
        function getStoreForType(type) {
            if (type === 'supplier') return allSuppliers;
            if (type === 'department') return allDepartments;
            if (type === 'staff') return allStaff;
            return [];
        }

        async function handleSimpleSave(e) {
            e.preventDefault();
            const id = document.getElementById('simple-modal-id').value;
            const data = {};
            simpleModalConfig.fields.forEach(field => {
                data[field.key] = document.getElementById(`field-${field.key}`).value;
            });

            try {
                const docRef = id ? doc(db, simpleModalConfig.collection, id) : doc(collection(db, simpleModalConfig.collection));
                await setDoc(docRef, data, { merge: true });
                showToast(`${simpleModalConfig.title.split(' ')[1]} saved.`, 'success');
                await loadInitialData();
                closeSimpleModal();
            } catch (error) {
                console.error("Error saving:", error);
                showToast('Error saving.', 'error');
            }
        }

        async function handleSimpleDelete() {
            const id = document.getElementById('simple-modal-id').value;
            if (!id || !confirm('Are you sure you want to delete this item?')) return;
            try {
                await deleteDoc(doc(db, simpleModalConfig.collection, id));
                showToast('Item deleted.', 'success');
                await loadInitialData();
                closeSimpleModal();
            } catch (error) {
                console.error("Error deleting:", error);
                showToast('Error deleting item.', 'error');
            }
        }
        
        function closeSimpleModal() {
            simpleModal.classList.add('hidden');
            simpleForm.reset();
        }

        // --- Modal & UI Helpers ---
        function openProductModal(product = null) {
            productForm.reset();
            document.getElementById('modal-title').textContent = product ? 'Edit Product' : 'Add Product';
            document.getElementById('product-id').value = product ? product.id : '';
            
            productSupplierSelect.innerHTML = allSuppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

            if (product) {
                document.getElementById('product-name-en').value = product.name_en || '';
                document.getElementById('product-name-th').value = product.name_th || '';
                document.getElementById('product-category-en').value = product.category_en || '';
                document.getElementById('product-category-th').value = product.category_th || '';
                document.getElementById('product-packaging-en').value = product.packaging_en || '';
                document.getElementById('product-packaging-th').value = product.packaging_th || '';
                document.getElementById('product-supplier').value = product.supplier || '';
                document.getElementById('product-reference').value = product.product_reference || '';
                document.getElementById('product-keywords').value = product.keywords || '';
                document.getElementById('product-image-url').value = product.imageUrl || '';
                document.getElementById('product-is-active').checked = product.isActive !== false;
            } else {
                 document.getElementById('product-is-active').checked = true;
            }

            productModal.classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        function closeProductModal() {
            productModal.classList.add('hidden');
            document.body.classList.remove('modal-open');
        }
        
        function switchTab(tabId) {
            tabContents.forEach(content => content.classList.add('hidden'));
            tabButtons.forEach(button => button.classList.remove('active', 'border-blue-600', 'text-blue-600'));
            
            document.getElementById(`${tabId}-tab`).classList.remove('hidden');
            const activeButton = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
            activeButton.classList.add('active', 'border-blue-600', 'text-blue-600');
        }

        function showToast(message, type = 'info') {
            const colors = {
                info: 'bg-blue-500',
                success: 'bg-green-500',
                error: 'bg-red-500'
            };
            const toast = document.createElement('div');
            toast.className = `toast ${colors[type]} text-white font-bold rounded-lg shadow-md py-3 px-5`;
            toast.textContent = message;
            document.getElementById('toast-container').appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- CSV Functionality ---
        function parseCSV(text) {
            const lines = text.split(/\r\n|\n/);
            const header = lines[0].split(',').map(h => h.trim());
            const rows = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i]) continue;
                const values = lines[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
                const row = header.reduce((obj, h, index) => {
                    let value = (values[index] || '').trim();
                    if (value.startsWith('"') && value.endsWith('"')) {
                        value = value.slice(1, -1);
                    }
                    obj[h] = value;
                    return obj;
                }, {});
                rows.push(row);
            }
            return rows;
        }

        function exportToCSV(data, headers, filename) {
            const csvRows = [];
            csvRows.push(headers.join(','));
            for (const item of data) {
                const values = headers.map(header => {
                    let value = item[header] || '';
                    if (typeof value === 'string' && value.includes(',')) {
                        value = `"${value}"`;
                    }
                    return value;
                });
                csvRows.push(values.join(','));
            }
            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', filename);
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        async function handleFileImport(event, collectionName, headers, transformFn = null) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const text = e.target.result;
                const data = parseCSV(text);
                const warnings = [];
                
                appLoading.classList.remove('hidden');

                for (const row of data) {
                    let docData = transformFn ? transformFn(row, warnings) : row;
                    if (docData) {
                        const docId = docData.id || docData.uid || row[headers[0]];
                        if (!docId) {
                           warnings.push(`Skipping row with missing ID: ${JSON.stringify(row)}`);
                           continue;
                        }
                        try {
                            await setDoc(doc(db, collectionName, docId), docData, { merge: true });
                        } catch(error) {
                             warnings.push(`Error importing row for ID ${docId}: ${error.message}`);
                        }
                    }
                }
                
                await loadInitialData();
                appLoading.classList.add('hidden');
                
                if(warnings.length > 0) {
                    alert('Import completed with warnings:\n\n' + warnings.join('\n'));
                }
                showToast('CSV import completed!', 'success');
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input
        }

        importProductsBtn.addEventListener('click', () => productCsvInput.click());
        exportProductsBtn.addEventListener('click', () => {
            const dataToExport = allProducts.map(p => ({
                ...p,
                supplier: allSuppliers.find(s => s.id === p.supplier)?.name || ''
            }));
            exportToCSV(dataToExport, ["product_reference", "name_en", "name_th", "category_en", "category_th", "packaging_en", "packaging_th", "supplier", "keywords", "imageUrl", "isActive"], 'products_export.csv');
        });
        productCsvInput.addEventListener('change', (e) => handleFileImport(e, 'products', ['product_reference'], (data, warnings) => {
            const supplier = allSuppliers.find(s => s.name.toLowerCase() === data.supplier.toLowerCase());
            if (!supplier) {
                warnings.push(`Supplier "${data.supplier}" not found for product ${data.name_en}. Skipping supplier field.`);
            }
            return {
                ...data,
                supplier: supplier ? supplier.id : '',
                isActive: data.isActive?.toLowerCase() === 'true'
            };
        }));
        
        importStaffBtn.addEventListener('click', () => staffCsvInput.click());
        exportStaffBtn.addEventListener('click', () => exportToCSV(allStaff, ["id", "name", "department_name_en"], 'staff_export.csv'));
        staffCsvInput.addEventListener('change', (e) => handleFileImport(e, 'users', ['uid', 'name', 'department_name_en'], (data, warnings) => {
            const dept = allDepartments.find(d => d.name_en.toLowerCase() === data.department_name_en.toLowerCase());
            if (!dept) {
                warnings.push(`Department "${data.department_name_en}" not found for user ${data.name}. Skipping.`);
                return null;
            }
            return { uid: data.uid, name: data.name, departmentId: dept.id };
        }));

        importSupplierBtn.addEventListener('click', () => supplierCsvInput.click());
        exportSupplierBtn.addEventListener('click', () => exportToCSV(allSuppliers, ["name"], 'suppliers_export.csv'));
        supplierCsvInput.addEventListener('change', (e) => handleFileImport(e, 'suppliers', ['name'], (data) => data));

        importDepartmentBtn.addEventListener('click', () => departmentCsvInput.click());
        exportDepartmentBtn.addEventListener('click', () => exportToCSV(allDepartments, ["name_en", "name_th"], 'departments_export.csv'));
        departmentCsvInput.addEventListener('change', (e) => handleFileImport(e, 'departments', ['name_en'], (data) => data));

    </script>
</body>
