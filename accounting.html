<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting - Da Moreno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <style>
        body { font-family: 'Inter', sans-serif; }
        #toast-container { position: fixed; top: 1.25rem; right: 1.25rem; z-index: 50; }
        .toast { transform: translateX(120%); transition: transform 0.3s ease-in-out; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body class="bg-gray-100 pb-12">

    <div id="toast-container"></div>
    <div id="access-denied" class="hidden text-center p-8"><h1 class="text-2xl font-bold text-red-600">Access Denied</h1></div>

    <div id="app" class="max-w-5xl mx-auto p-4 sm:p-6 hidden">
        <header class="mb-8 flex justify-between items-center bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-100">
            <h1 class="text-2xl font-bold text-gray-800" data-key="awaiting_payments">Awaiting Payments</h1>
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-sm font-bold text-gray-600 hover:text-blue-600">← Dashboard</a>
            </div>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <div class="flex justify-between items-center mb-6">
                <p class="text-gray-600 text-sm">Review received orders and mark them as paid.</p>
                
                <!-- Sélecteur de Branche pour filtrer la vue comptable -->
                <div id="branch-filter-container" class="hidden items-center bg-gray-50 border rounded-lg px-2 py-1">
                    <span class="text-xs text-gray-500 mr-2 font-bold uppercase">Branch:</span>
                    <select id="accounting-branch-select" class="bg-transparent text-sm font-bold text-blue-700 focus:outline-none">
                        <option value="ALL">ALL BRANCHES</option>
                    </select>
                </div>
            </div>

            <div id="loading-spinner" class="text-center py-6 animate-pulse text-gray-400">Loading pending payments...</div>
            <div id="payments-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- MODAL DE PAIEMENT -->
    <div id="pay-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-lg max-h-[95vh] flex flex-col">
            <div class="flex justify-between items-center p-4 border-b bg-purple-50 rounded-t-lg">
                <h2 class="text-xl font-bold text-purple-800" data-key="pay_order">Settle Payment</h2>
                <button class="close-modal text-gray-500 text-2xl font-bold hover:text-red-500">&times;</button>
            </div>
            
            <div class="p-6 overflow-y-auto">
                <div class="bg-gray-50 p-4 rounded-lg border mb-6 text-center">
                    <p class="text-sm text-gray-500 font-bold uppercase mb-1" data-key="invoice_amount">Invoice Amount</p>
                    <p id="pay-amount-display" class="text-4xl font-extrabold text-blue-700 font-mono">0.00</p>
                    <p id="pay-method-display" class="text-sm text-gray-600 mt-2 font-bold"></p>
                </div>

                <form id="payment-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1" data-key="payment_date">Payment Date</label>
                        <input type="date" id="actual-payment-date" class="w-full p-2 border rounded" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1" data-key="transaction_ref">Transaction / Transfer Ref</label>
                        <input type="text" id="transaction-ref" class="w-full p-2 border rounded font-mono" placeholder="Optional reference..." autocomplete="off">
                    </div>
                </form>
            </div>

            <div class="p-4 border-t bg-gray-50 rounded-b-lg flex justify-end gap-3">
                <button type="button" class="close-modal px-4 py-2 bg-gray-200 text-gray-700 font-bold rounded" data-key="cancel">Cancel</button>
                <button type="button" id="confirm-payment-btn" class="px-6 py-2 bg-purple-600 text-white font-bold rounded shadow hover:bg-purple-700 transition-colors" data-key="mark_as_paid">Confirm Payment</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/accounting.js"></script>
</body>
</html>
