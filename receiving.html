<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receive Orders - Da Moreno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <style>
        body { font-family: 'Inter', sans-serif; }
        #toast-container { position: fixed; top: 1.25rem; right: 1.25rem; z-index: 50; }
        .toast { transform: translateX(120%); transition: transform 0.3s ease-in-out; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body class="bg-gray-100 pb-12">

    <div id="toast-container"></div>
    <div id="access-denied" class="hidden text-center p-8"><h1 class="text-2xl font-bold text-red-600">Access Denied</h1></div>

    <div id="app" class="max-w-4xl mx-auto p-4 sm:p-6 hidden">
        <header class="mb-8 flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <h1 class="text-2xl font-bold text-gray-800">Awaiting Deliveries</h1>
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-sm font-bold text-gray-600 hover:text-blue-600">← Back to Dashboard</a>
            </div>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
            <p class="text-gray-600 mb-6">Select a processed order to point the delivery and mark it as Received.</p>
            <div id="loading-spinner" class="text-center py-6 animate-pulse text-gray-400">Loading expected deliveries...</div>
            <div id="deliveries-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- MODAL DE RÉCEPTION -->
    <div id="receive-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-3xl max-h-[95vh] flex flex-col">
            <div class="flex justify-between items-center p-4 border-b bg-green-50 rounded-t-lg">
                <h2 class="text-xl font-bold text-green-800">Receive Delivery</h2>
                <button class="close-modal text-gray-500 text-2xl font-bold hover:text-red-500">&times;</button>
            </div>
            
            <div class="p-4 overflow-y-auto">
                <h3 class="font-bold text-gray-700 mb-2 border-b pb-1">1. Check Items Quantity</h3>
                <div id="receive-items-container" class="space-y-2 mb-6"></div>

                <h3 class="font-bold text-gray-700 mb-2 border-b pb-1">2. Financial Details</h3>
                <form id="receive-form" class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-gray-50 p-4 rounded border">
                    <div>
                        <label class="block text-sm font-bold text-gray-600">Total Invoice Amount (THB)</label>
                        <input type="number" step="0.01" id="invoice-total" class="w-full p-2 border rounded font-mono font-bold text-lg text-blue-700" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600">Invoice / Receipt Number</label>
                        <input type="text" id="invoice-ref" class="w-full p-2 border rounded" placeholder="e.g. INV-2026-001">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600">Payment Method</label>
                        <select id="payment-method" class="w-full p-2 border rounded" required>
                            <option value="Cash">Cash on Delivery</option>
                            <option value="QR">PromptPay / QR</option>
                            <option value="Bank Transfer">Bank Transfer</option>
                            <option value="Credit">Credit (Pay Later)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 text-purple-700">Payment Due Date</label>
                        <input type="date" id="payment-due-date" class="w-full p-2 border rounded bg-purple-50 border-purple-200" required>
                        <p class="text-xs text-gray-500 mt-1" id="payment-terms-hint">Supplier Terms: Loading...</p>
                    </div>
                </form>
            </div>

            <div class="p-4 border-t bg-gray-50 rounded-b-lg flex justify-end gap-3">
                <button type="button" class="close-modal px-4 py-2 bg-gray-200 text-gray-700 font-bold rounded">Cancel</button>
                <button type="button" id="confirm-receive-btn" class="px-6 py-2 bg-green-600 text-white font-bold rounded shadow hover:bg-green-700 transition-colors">Confirm & Mark as Received</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/receiving.js"></script>
</body>
</html>
