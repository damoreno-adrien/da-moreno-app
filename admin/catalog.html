<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog - Da Moreno Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://fav.farm/🇮🇹" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .modal-open {
            overflow: hidden;
        }

        .table-cell {
            padding: 8px;
            white-space: nowrap;
        }

        @media (min-width: 640px) {
            .table-cell {
                padding: 12px 16px;
            }
        }

        #toast-container {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            z-index: 50;
        }

        .toast {
            transform: translateX(120%);
            transition: transform 0.3s ease-in-out;
        }

        .toast.show {
            transform: translateX(0);
        }

        .lang-btn.active {
            background-color: #2563eb;
            color: white;
        }

        .lang-btn:not(.active) {
            background-color: #e5e7eb;
            color: #374151;
        }

        .sortable:hover {
            background-color: #e5e7eb;
            cursor: pointer;
        }

        .sortable .sort-icon {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .sortable:hover .sort-icon {
            opacity: 0.5;
        }

        .sortable.asc .sort-icon,
        .sortable.desc .sort-icon {
            opacity: 1;
        }

        .nav-link.active {
            border-bottom: 2px solid #2563eb;
            color: #2563eb;
            font-weight: 600;
        }
    </style>
</head>

<body class="bg-gray-100">

    <div id="access-denied" class="hidden text-center p-8">
        <h1 class="text-2xl font-bold text-red-600">Access Denied</h1>
        <p class="text-gray-700">Redirecting...</p>
    </div>

    <div id="toast-container"></div>

    <div id="app" class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 hidden">
        <header class="mb-8">
            <div class="flex flex-col sm:flex-row justify-between sm:items-start gap-4">
                <div>
                    <h1 class="text-3xl sm:text-4xl font-bold text-gray-800" data-key="catalog">Catalog</h1>
                    <p class="text-sm text-gray-500 mt-1">Shared catalog across all branches</p>
                </div>
                <div class="w-full sm:w-auto flex flex-col sm:flex-row items-end sm:items-center gap-4">
                    <p id="user-display" class="text-sm text-gray-600 w-full sm:w-auto text-right sm:text-left"></p>
                    <div class="w-full sm:w-auto justify-between flex items-center gap-2">
                        <div id="lang-switcher"
                            class="flex items-center gap-1 text-sm font-medium border border-gray-300 rounded-lg p-1">
                            <button data-lang="en" class="lang-btn px-2 py-1 rounded-md">EN</button>
                            <button data-lang="th" class="lang-btn px-2 py-1 rounded-md">TH</button>
                        </div>
                        <div class="hidden sm:flex items-center gap-2">
                            <a href="../index.html"
                                class="justify-center px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 text-sm">Create
                                Order</a>
                            <a href="../my-orders.html"
                                class="justify-center px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 text-sm">My
                                Orders</a>

                            <button id="logout-btn"
                                class="justify-center px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700"
                                data-key="logout">Logout</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation Interne Admin -->
            <nav class="mt-6 border-b flex gap-6 text-gray-500">
                <a href="orders.html" class="nav-link py-3 hover:text-blue-600" data-key="order_processing">Orders</a>
                <a href="catalog.html" class="nav-link active py-3" data-key="catalog">Catalog</a>
                <a href="organization.html" class="nav-link py-3 hover:text-blue-600">Organization</a>
            </nav>
        </header>

        <!-- Product Management -->
        <div class="bg-white p-6 rounded-lg shadow-sm mb-8">
            <div class="flex flex-col md:flex-row justify-between md:items-center mb-4 gap-4">
                <h2 class="text-2xl font-bold text-gray-700" data-key="product_management">Product Management</h2>
                <div
                    class="flex flex-col sm:flex-row sm:flex-wrap items-center justify-start sm:justify-end gap-2 w-full md:w-auto">
                    <input type="file" id="csv-file-input" class="hidden" accept=".csv">
                    <button id="import-csv-btn"
                        class="w-full sm:w-auto bg-indigo-600 text-white font-bold p-2 rounded-lg hover:bg-indigo-700 flex items-center justify-center gap-2">
                        <span data-key="import_csv">Import</span>
                    </button>
                    <button id="export-csv-btn"
                        class="w-full sm:w-auto bg-gray-700 text-white font-bold p-2 rounded-lg hover:bg-gray-800 flex items-center justify-center gap-2">
                        <span data-key="export_csv">Export</span>
                    </button>
                    <button id="add-product-btn"
                        class="w-full sm:w-auto bg-green-600 text-white font-bold p-2 rounded-lg hover:bg-green-700 flex items-center justify-center gap-2">
                        <span data-key="add_new_product">Add Product</span>
                    </button>
                </div>
            </div>
            <div class="flex flex-col md:flex-row justify-end items-center gap-2 mb-4">
                <div class="relative w-full md:w-auto">
                    <input type="text" id="product-search" class="w-full p-2 border rounded-lg text-sm pl-8"
                        placeholder="Search products...">
                    <button id="product-clear-search"
                        class="absolute right-2 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400 hover:text-gray-600 hidden">&times;</button>
                </div>
                <select id="supplier-filter" class="w-full md:w-auto p-2 border rounded-lg text-sm">
                    <option value="All" data-key="all_suppliers">All Suppliers</option>
                </select>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full bg-white">
                    <thead class="bg-gray-200">
                        <tr>
                            <th class="table-cell text-left font-semibold text-gray-600" data-key="image">Image</th>
                            <th class="table-cell text-left font-semibold text-gray-600 sortable" data-sort="name_en"
                                data-key="product_name">Product Name ⇅</th>
                            <th class="table-cell text-left font-semibold text-gray-600 sortable"
                                data-sort="product_reference" data-key="reference">Reference ⇅</th>
                            <th class="table-cell text-left font-semibold text-gray-600 sortable" data-sort="supplier"
                                data-key="supplier">Supplier ⇅</th>
                            <th class="table-cell text-left font-semibold text-gray-600 sortable" data-sort="isActive"
                                data-key="status">Status ⇅</th>
                            <th class="table-cell text-left font-semibold text-gray-600" data-key="actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-table-body"></tbody>
                </table>
                <div id="products-pagination-controls" class="mt-4 flex justify-center items-center gap-4"></div>
            </div>
        </div>

        <!-- Supplier Management -->
        <div class="bg-white p-6 rounded-lg shadow-sm mb-8">
            <div class="flex flex-col md:flex-row justify-between md:items-center mb-4 gap-4">
                <h2 class="text-2xl font-bold text-gray-700" data-key="supplier_management">Suppliers</h2>
                <div
                    class="flex flex-col sm:flex-row sm:flex-wrap items-center justify-start sm:justify-end gap-2 w-full md:w-auto">
                    <input type="file" id="supplier-csv-input" class="hidden" accept=".csv">
                    <button id="import-supplier-btn"
                        class="w-full sm:w-auto bg-indigo-600 text-white font-bold p-2 rounded-lg hover:bg-indigo-700 flex items-center justify-center gap-2">
                        <span data-key="import_csv">Import</span>
                    </button>
                    <button id="export-supplier-btn"
                        class="w-full sm:w-auto bg-gray-700 text-white font-bold p-2 rounded-lg hover:bg-gray-800 flex items-center justify-center gap-2">
                        <span data-key="export_csv">Export</span>
                    </button>
                    <button id="add-supplier-btn"
                        class="w-full sm:w-auto bg-orange-600 text-white font-bold p-2 rounded-lg hover:bg-orange-700 flex items-center justify-center gap-2">
                        <span data-key="add_new_supplier">Add Supplier</span>
                    </button>
                </div>
            </div>
            <div class="mb-4 relative">
                <input type="text" id="supplier-search" class="w-full p-2 border rounded-lg text-sm pl-8"
                    placeholder="Search suppliers...">
                <button id="supplier-clear-search"
                    class="absolute right-2 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400 hover:text-gray-600 hidden">&times;</button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full bg-white">
                    <thead class="bg-gray-200">
                        <tr>
                            <th class="table-cell text-left font-semibold text-gray-600 sortable" data-sort="name"
                                data-key="name">Name ⇅</th>
                            <th class="table-cell text-left font-semibold text-gray-600" data-key="actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="suppliers-table-body"></tbody>
                </table>
                <div id="suppliers-pagination-controls" class="mt-4 flex justify-center items-center gap-4"></div>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-30 p-4">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center p-4 border-b">
                <h2 id="modal-title" class="text-2xl font-bold text-gray-800" data-key="add_new_product">Add New Product
                </h2>
                <button class="close-modal text-gray-500 text-3xl">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto">
                <form id="product-form" class="space-y-4">
                    <input type="hidden" id="product-id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block font-medium" data-key="name_en">Name (EN)</label><input type="text"
                                id="name_en" class="w-full p-2 border rounded" required></div>
                        <div><label class="block font-medium" data-key="name_th">Name (TH)</label><input type="text"
                                id="name_th" class="w-full p-2 border rounded"></div>
                        <div><label class="block font-medium" data-key="product_reference">Product
                                Reference</label><input type="text" id="product_reference"
                                class="w-full p-2 border rounded"></div>
                        <div><label class="block font-medium" data-key="supplier">Supplier</label><select
                                id="product-supplier-select" class="w-full p-2 border rounded"></select></div>
                        <div>
                            <label class="block font-medium" data-key="category_en">Category (EN)</label>
                            <input type="text" id="category_en" list="category-en-list"
                                class="w-full p-2 border rounded">
                            <datalist id="category-en-list"></datalist>
                        </div>
                        <div>
                            <label class="block font-medium" data-key="category_th">Category (TH)</label>
                            <input type="text" id="category_th" list="category-th-list"
                                class="w-full p-2 border rounded">
                            <datalist id="category-th-list"></datalist>
                        </div>
                        <div><label class="block font-medium" data-key="packaging_en">Packaging (EN)</label><input
                                type="text" id="packaging_en" class="w-full p-2 border rounded"></div>
                        <div><label class="block font-medium" data-key="packaging_th">Packaging (TH)</label><input
                                type="text" id="packaging_th" class="w-full p-2 border rounded"></div>
                    </div>
                    <div><label class="block font-medium" data-key="keywords">Search Keywords</label><input type="text"
                            id="keywords" class="w-full p-2 border rounded" placeholder="e.g. straw, drinking, plastic">
                    </div>
                    <div><label class="block font-medium" data-key="image_url">Image URL</label><input type="url"
                            id="imageUrl" class="w-full p-2 border rounded"></div>
                    <div class="flex items-center"><input type="checkbox" id="isActive"
                            class="h-4 w-4 rounded mr-2"><label for="isActive" data-key="product_is_active">Product is
                            Active (Visible in catalog)</label></div>
                </form>
            </div>
            <div class="p-4 border-t mt-auto flex justify-end gap-4">
                <button type="button" class="close-modal px-6 py-2 bg-gray-200 text-gray-700 rounded-lg"
                    data-key="cancel">Cancel</button>
                <button type="submit" form="product-form" class="px-6 py-2 bg-blue-600 text-white rounded-lg"
                    data-key="save_product">Save Product</button>
            </div>
        </div>
    </div>

    <!-- Supplier Modal -->
    <div id="supplier-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-30 p-4">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-lg">
            <div class="flex justify-between items-center p-4 border-b">
                <h2 id="supplier-modal-title" class="text-2xl font-bold text-gray-800" data-key="add_new_supplier">Add
                    New Supplier</h2>
                <button class="close-modal text-gray-500 text-3xl">&times;</button>
            </div>
            <div class="p-6">
                <form id="supplier-form" class="space-y-4">
                    <input type="hidden" id="supplier-id">
                    <div><label class="block font-medium" data-key="name">Name</label><input type="text"
                            id="supplier-name" class="w-full p-2 border rounded" required></div>
                </form>
            </div>
            <div class="p-4 border-t flex justify-end gap-4">
                <button type="button" class="close-modal px-6 py-2 bg-gray-200 text-gray-700 rounded-lg"
                    data-key="cancel">Cancel</button>
                <button type="submit" form="supplier-form" class="px-6 py-2 bg-blue-600 text-white rounded-lg"
                    data-key="save_supplier">Save Supplier</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/catalog.js"></script>
</body>

</html>
