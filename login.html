<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Da Moreno Supply Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="/favicon.ico">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .lang-btn.active {
            background-color: #2563eb;
            color: white;
        }

        .lang-btn:not(.active) {
            background-color: #e5e7eb;
            color: #374151;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen p-4">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg relative">
        <div class="absolute top-4 right-4">
            <div id="lang-switcher"
                class="flex items-center gap-1 text-sm font-medium border border-gray-300 rounded-lg p-1">
                <button data-lang="en" class="lang-btn px-2 py-1 rounded-md">EN</button>
                <button data-lang="th" class="lang-btn px-2 py-1 rounded-md">TH</button>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2" data-key="main_title">Da Moreno</h1>
        <p class="text-center text-gray-500 mb-8" data-key="main_subtitle">Supply Order System</p>

        <div id="error-message"
            class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative mb-6"
            role="alert">
            <strong class="font-bold" data-key="error_title">Error:</strong>
            <span class="block sm:inline" id="error-text"></span>
        </div>

        <form id="login-form">
            <div class="mb-4">
                <label for="email" class="block text-gray-700 text-sm font-bold mb-2" data-key="email_label">Email
                    Address</label>
                <input type="email" id="email" name="email"
                    class="shadow-sm appearance-none border rounded-lg w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required>
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 text-sm font-bold mb-2"
                    data-key="password_label">Password</label>
                <input type="password" id="password" name="password"
                    class="shadow-sm appearance-none border rounded-lg w-full py-3 px-4 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required>
            </div>
            <div class="flex items-center justify-between">
                <button type="submit" id="login-button"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg focus:outline-none focus:shadow-outline flex items-center justify-center gap-2">
                    <span id="login-text" data-key="sign_in">Sign In</span>
                    <svg id="login-spinner" class="animate-spin h-5 w-5 text-white hidden"
                        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8-0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                </button>
            </div>
        </form>
        <div class="text-center mt-4">
            <a href="#" id="forgot-password-link" class="text-sm text-blue-600 hover:underline"
                data-key="forgot_password">Forgot Password?</a>
        </div>
    </div>

    <!-- Chargement du nouveau script modulaire -->
    <script type="module" src="js/login.js"></script>
</body>

</html>
